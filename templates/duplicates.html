        display: flex;

        margin-top: 32px;
        flex-wrap: wrap;
    }
    .duplicates-actions .btn {
        box-sizing: border-box;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 220px;
        height: 54px;

    }

{% block content %}
<h1>Проверка дублей</h1>
<div class="duplicates-actions">
